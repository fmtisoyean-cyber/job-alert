name: 채용공고 자동 알림

on:
  schedule:
    - cron: '0 0 * * *'   # 오전 9시 KST  (UTC 00:00 = KST 09:00)
    - cron: '0 9 * * *'   # 오후 6시 KST  (UTC 09:00 = KST 18:00)
  workflow_dispatch:        # GitHub UI에서 수동 실행 허용

# seen_jobs.json을 repo에 커밋하기 위한 쓰기 권한
permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 채용공고 수집 및 텔레그램 알림
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}

      - name: seen_jobs.json 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet \
            && echo "변경 없음, 커밋 생략" \
            || (git commit -m "chore: update seen_jobs [skip ci]" && git push)
